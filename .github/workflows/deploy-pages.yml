name: Deploy Angular app to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Build Angular app for GitHub Pages
        run: npm run build:pages

      - name: Prepare GitHub Pages artifact
        run: |
          mkdir -p dist/pages

          if [ -d "dist/angular-serverless-commerce-dashboard/browser" ]; then
            cp -R dist/angular-serverless-commerce-dashboard/browser/. dist/pages/
          elif [ -d "dist/angular-serverless-commerce-dashboard" ]; then
            cp -R dist/angular-serverless-commerce-dashboard/. dist/pages/
          else
            echo "Build output directory not found."
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pages

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
